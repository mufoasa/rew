<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Your PayPal Reward</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal" class="h-12 mx-auto mb-6">
        
        <h1 class="text-3xl font-bold text-gray-900 mb-4">
            $750 Reward Available in <span id="country-name" class="text-blue-600">Loading...</span>!
        </h1>
        
        <p class="text-gray-600 mb-8">
            Complete the quick verification below to claim your balance directly to your PayPal account.
        </p>

        <a href="offers.html" class="block w-full bg-blue-600 text-white text-lg font-semibold py-4 rounded-xl hover:bg-blue-700 transition duration-200">
            Claim Now
        </a>
    </div>

    <script>
        // Detect country using free IP API
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                document.getElementById('country-name').textContent = data.country_name;
            })
            .catch(error => {
                console.error('Error fetching country:', error);
                document.getElementById('country-name').textContent = "your country";
            });
    </script>
</body>
</html>
