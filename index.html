<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Your Reward | PayPal Cash</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary-color: #0070ba; /* PayPal Blue */
            --secondary-color: #003087;
        }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e4e7eb 100%); font-family: sans-serif; }
        .card { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); }
        .btn-gradient { background: linear-gradient(90deg, #0070ba, #003087); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6 card">
        <div class="text-center mb-6">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal" class="mx-auto h-12 mb-4">
            <h1 class="text-3xl font-bold text-gray-800">$750 PayPal Cash</h1>
            <p class="text-gray-600">Complete tasks below to unlock your reward</p>
        </div>

        <div id="offers-container" class="space-y-4">
            <div class="text-center py-10">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
                <p class="text-gray-500 mt-2">Loading offers...</p>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURE THIS ---
        const apiKey = '41687|Qo6yzt9oZtDMeAOESQBkfLM9z5FM70F9ezcFQKhj3b4edd86'; 
        // ----------------------

        async function fetchOffers() {
            const container = document.getElementById('offers-container');
            
            // Note: This uses a public IP service for demonstration. 
            // Real apps need the user's actual IP passed from a backend.
            const ip = '1.1.1.1'; 
            const userAgent = navigator.userAgent;

            try {
                const response = await fetch(`https://confirmapp.store/api/v2?ip=${ip}&user_agent=${encodeURIComponent(userAgent)}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });

                const data = await response.json();
                container.innerHTML = ''; // Clear spinner

                if (!data.offers || data.offers.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-500">No offers available right now.</p>';
                    return;
                }

                data.offers.forEach(offer => {
                    const offerCard = `
                        <div class="offer-card bg-white p-4 rounded-lg border shadow-sm flex items-center justify-between hover:border-blue-500 transition">
                            <div>
                                <h3 class="font-bold text-sm text-gray-800">${offer.name}</h3>
                                <p class="text-xs text-gray-500">${offer.description || 'Complete this task'}</p>
                            </div>
                            <a href="${offer.link}" target="_blank" class="btn-gradient text-white text-sm font-medium py-2 px-4 rounded-lg hover:opacity-90">
                                Earn $${offer.payout}
                            </a>
                        </div>
                    `;
                    container.innerHTML += offerCard;
                });

            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<p class="text-center text-red-500">Failed to load offers. Please check your API key.</p>';
            }
        }

        fetchOffers();
    </script>
</body>
</html>
