<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Access | Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-sm w-full bg-white rounded-3xl p-8 shadow-2xl shadow-blue-100 border border-slate-100 text-center">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-lg shadow-blue-200">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Security Check</h1>
        <p class="text-slate-500 text-sm mb-8">Confirm your email to verify eligibility for rewards in your region.</p>
        <form id="lead-form" class="space-y-4">
            <div class="text-left">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required 
                    class="w-full mt-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                VERIFY & CONTINUE
            </button>
        </form>
        <div class="mt-8 text-[10px] text-slate-400 flex items-center justify-center gap-2">
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> System Secure • Ray ID: <span id="ray"></span>
        </div>
    </div>
    <script>
        document.getElementById('ray').innerText = Math.random().toString(36).substring(2, 9).toUpperCase();
        document.getElementById('lead-form').onsubmit = function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            // CHANGE THESE LINKS LATER
            const ADSTERRA_LINK = "PASTE_ADSTERRA_LINK_HERE";
            const OGADS_LINK = "PASTE_OGADS_LINK_HERE";
            
            window.open(ADSTERRA_LINK, "_blank");
            setTimeout(() => {
                window.location.href = OGADS_LINK + "&aff_sub5=" + encodeURIComponent(email);
            }, 150);
        };
    </script>
</body>
</html>
