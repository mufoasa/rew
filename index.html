<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reward Access Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background: linear-gradient(135deg,#f5f7fb,#eef2ff);
}
.card{
    backdrop-filter: blur(8px);
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen p-4">

<div class="bg-white card shadow-xl rounded-2xl p-8 w-full max-w-md text-center">

<h1 class="text-3xl font-bold mb-4 text-gray-900">
Exclusive Reward Opportunity Available
</h1>

<p class="text-gray-600 mb-6">
Complete partner verification steps to unlock available reward programs in your region.
</p>

<div class="mb-6 text-blue-600 font-semibold text-lg">
Country: <span id="country-name">Detecting...</span>
</div>

<a href="https://www.mobtrk.link/view.php?id=5543383&pub=3339265"
   data-interact-trigger
   data-tool-id="62672"
   class="block w-full bg-blue-600 hover:bg-blue-700 transition text-white font-semibold py-4 rounded-xl text-lg">

Continue to Available Offers

</a>

<p class="text-xs text-gray-400 mt-6">
Partner reward campaigns. Registration and offer completion may be required.
</p>

</div>

<!-- CPAlead Publisher Script -->
<script>
window.CPAlead_PublisherUserId = 3339265;
</script>

<script src="https://cdnflair.com/js/interact-form.js" async defer></script>

<script>
// Country detection
fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{
    document.getElementById("country-name").innerText =
        data.country_name || "your region";
})
.catch(()=>{
    document.getElementById("country-name").innerText = "your region";
});
</script>

</body>
</html>
